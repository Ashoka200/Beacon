<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beacon — Owner Console</title>
<style>
  :root{--navy:#0f2540;--navy-50:#eef2f8;--ink:#1c2733;--slate:#5f6e80;--line:#e3e7ee;--gold:#e8a33d;--gold-soft:#fdf3e0;--gold-deep:#c9802b;
        --paper:#f6f8fb;--ok:#1e8e5a;--ok-soft:#e6f4ec;--bad:#c5352f;--bad-soft:#fdecea;
        --sh:0 1px 3px rgba(16,24,40,.07),0 8px 24px rgba(16,24,40,.08)}
  *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;line-height:1.5}
  header{background:var(--navy);color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
  header .t{font-family:Georgia,serif;font-size:20px;font-weight:700}
  header .t small{font-size:12px;color:#cdd8e6;font-family:system-ui;margin-left:10px;font-weight:500}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px 17px;box-shadow:var(--sh)}
  .stat .k{font-size:11px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px}
  .stat .v{font-size:25px;font-weight:800;color:var(--navy);margin-top:2px}
  h2{font-size:16px;color:var(--navy);margin:24px 0 10px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh);overflow:hidden}
  table{border-collapse:collapse;width:100%;font-size:13px}
  th{background:var(--navy-50);color:var(--navy);text-align:left;padding:9px 13px;font-weight:700}
  td{border-top:1px solid var(--line);padding:9px 13px;vertical-align:middle}
  .row{display:flex;gap:13px;align-items:center;padding:13px 16px;border-top:1px solid var(--line);flex-wrap:wrap}
  .row:first-child{border-top:none}
  .row .thumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:1px solid var(--line)}
  .row .info{flex:1;min-width:200px}
  .kind{font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--slate)}
  .kind.launch{color:var(--gold-deep)}
  .lbl{font-size:13.5px;font-weight:700;color:var(--navy)}
  .tm{font-size:11.5px;color:var(--slate)}
  .btn{padding:7px 14px;font-size:12.5px;font-weight:700;border:none;border-radius:8px;cursor:pointer}
  .btn.ok{background:var(--ok);color:#fff}.btn.bad{background:#fff;color:var(--bad);border:1.5px solid #f1c3c0}
  .btn.navy{background:var(--navy);color:#fff}
  .st{font-size:11px;font-weight:800;border-radius:999px;padding:3px 11px}
  .st.pending{background:var(--gold-soft);color:var(--gold-deep)}.st.approved{background:var(--ok-soft);color:var(--ok)}.st.rejected{background:var(--bad-soft);color:var(--bad)}
  .gate{max-width:360px;margin:80px auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:28px;text-align:center;box-shadow:var(--sh)}
  .gate input{width:100%;padding:12px;font-size:15px;border:1.5px solid var(--line);border-radius:9px;text-align:center;margin:12px 0;outline:none}
  .gate .btn{width:100%;padding:11px}
  .muted{color:var(--slate);font-size:13px;text-align:center;padding:24px}
  .warn{background:var(--gold-soft);border:1px solid #f3dcae;color:var(--gold-deep);border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:16px}
</style>
</head>
<body>
<header><div class="t">⚓ Beacon <small>Owner Console</small></div><button class="btn navy" onclick="load()">↻ Refresh</button></header>

<div class="gate" id="gate">
  <h3 style="color:var(--navy);margin:0 0 4px">Owner sign-in</h3>
  <p style="color:var(--slate);font-size:13px;margin:0">Enter your owner code to manage Beacon.</p>
  <input id="code" type="password" placeholder="Owner code" onkeydown="if(event.key==='Enter')enter()"/>
  <button class="btn navy" onclick="enter()">Open console</button>
</div>

<div class="wrap" id="main" style="display:none">
  <div class="stats" id="stats"></div>
  <div class="warn" id="payWarn" style="display:none">💳 Payments are not connected yet — plan signups are collected as reservations. Add your STRIPE_SECRET_KEY to accept cards, Google Pay & Apple Pay.</div>
  <h2>🚀 Launch requests</h2><div class="card" id="launches"></div>
  <h2>✋ Client approvals</h2><div class="card" id="approvals"></div>
  <h2>📥 Plan reservations & leads</h2><div class="card" id="leads"></div>
</div>

<script>
function code(){return localStorage.getItem("beacon_admin")||""}
function enter(){const v=document.getElementById("code").value.trim();if(v){localStorage.setItem("beacon_admin",v);load()}}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function when(t){return new Date(t*1000).toLocaleString()}

async function decide(aid,decision){
  const r=await fetch("/approvals/"+aid,{method:"POST",headers:{"Content-Type":"application/json","X-Beacon-Admin":code()},body:JSON.stringify({decision,by:"owner"})});
  await r.json();load();
}

function rowHtml(a,isLaunch){
  let thumb="";
  if(a.kind==="generate_media"&&a.data&&a.data.assets){
    const img=a.data.assets.find(x=>x.kind==="image"&&x.data_url);
    if(img)thumb='<img class="thumb" src="'+img.data_url+'"/>';
  }
  let extra="";
  if(isLaunch&&a.data){
    const c=a.data.contact||{};
    extra='<div class="tm">'+esc(a.data.business||"")+(c.email?" · "+esc(c.email):"")+(c.phone?" · "+esc(c.phone):"")
      +(a.data.budget_monthly_usd?" · $"+a.data.budget_monthly_usd+"/mo":"")+'</div>';
  }
  return '<div class="row">'+thumb+'<div class="info"><div class="kind'+(isLaunch?" launch":"")+'">'+esc(a.kind.replace(/_/g," "))+'</div>'
    +'<div class="lbl">'+esc(a.label)+'</div><div class="tm">#'+a.id+' · '+when(a.created_at)+'</div>'+extra+'</div>'
    +(a.status==="pending"
      ?'<div><button class="btn ok" onclick="decide(\''+a.id+'\',\'approve\')">✓ Approve'+(isLaunch?' & launch':'')+'</button> <button class="btn bad" onclick="decide(\''+a.id+'\',\'reject\')">✗ Reject</button></div>'
      :'<span class="st '+a.status+'">'+a.status.toUpperCase()+(a.decided_by?' · '+esc(a.decided_by):'')+'</span>')
    +'</div>';
}

async function load(){
  const r=await fetch("/admin/data",{headers:{"X-Beacon-Admin":code()}});
  if(r.status===401){localStorage.removeItem("beacon_admin");document.getElementById("gate").style.display="block";document.getElementById("main").style.display="none";return}
  const d=await r.json();if(!d.ok)return;
  document.getElementById("gate").style.display="none";document.getElementById("main").style.display="block";
  const s=d.stats;
  document.getElementById("stats").innerHTML=
    '<div class="stat"><div class="k">Launches pending</div><div class="v">'+s.launch_requests_pending+'</div></div>'
    +'<div class="stat"><div class="k">Approvals pending</div><div class="v">'+s.pending_approvals+'</div></div>'
    +'<div class="stat"><div class="k">Leads</div><div class="v">'+s.leads_total+'</div></div>'
    +'<div class="stat"><div class="k">Actions (24h)</div><div class="v">'+s.billable_actions_24h+'</div></div>'
    +'<div class="stat"><div class="k">Demand factor</div><div class="v">'+s.demand_factor+'×</div></div>';
  document.getElementById("payWarn").style.display=s.payments_configured?"none":"block";
  const launches=d.approvals.filter(a=>a.kind==="launch_request");
  const rest=d.approvals.filter(a=>a.kind!=="launch_request");
  document.getElementById("launches").innerHTML=launches.length?launches.map(a=>rowHtml(a,true)).join(""):'<div class="muted">No launch requests yet.</div>';
  document.getElementById("approvals").innerHTML=rest.length?rest.map(a=>rowHtml(a,false)).join(""):'<div class="muted">Nothing in the approval queue.</div>';
  document.getElementById("leads").innerHTML=d.leads.length
    ?'<table><tr><th>When</th><th>Plan</th><th>Name</th><th>Email</th><th>Business</th></tr>'
      +d.leads.slice().reverse().map(l=>'<tr><td>'+when(l.created_at)+'</td><td>'+esc(l.plan||l.kind)+'</td><td>'+esc(l.name)+'</td><td>'+esc(l.email)+'</td><td>'+esc(l.business)+'</td></tr>').join("")+'</table>'
    :'<div class="muted">No leads yet — they appear the moment a client reserves a plan.</div>';
}
if(code())load();
</script>
</body>
</html>
